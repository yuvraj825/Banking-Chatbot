name: banking-rag
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - pip:
      # Core LangChain
      - langchain==0.2.16
      - langchain-community==0.2.16
      - langchain-core==0.2.38

      # LLM Providers
      - langchain-groq==0.1.9
      - langchain-huggingface==0.0.3
      - groq==0.11.0

      # Vector store
      - faiss-cpu==1.8.0

      # Embeddings
      - sentence-transformers==3.1.1

      # HuggingFace (embeddings + fallback LLM)
      - huggingface-hub==0.25.1
      - transformers==4.44.2

      # PDF loading
      - pypdf==4.3.1

      # Web scraping
      - beautifulsoup4==4.12.3
      - requests==2.32.3

      # Scheduling
      - apscheduler==3.10.4

      # UI
      - streamlit==1.39.0

      # Evaluation
      - ragas==0.1.21
      - datasets==3.0.1

      # Utilities
      - pandas==2.2.3
      - python-dotenv==1.0.1
